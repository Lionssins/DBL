<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Booking Mobil Karyawan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #888; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800">

    <nav class="bg-blue-800 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="fas fa-car-side text-2xl"></i>
                <h1 class="text-xl font-bold tracking-wide">CorpCar Booking</h1>
            </div>
            <button id="authBtn" onclick="toggleAdminMode()" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg text-sm transition shadow">
                <i class="fas fa-user-shield mr-1"></i> Login Admin
            </button>
        </div>
    </nav>

    <div class="container mx-auto p-4 grid grid-cols-1 lg:grid-cols-3 gap-6 mt-4">

        <div class="lg:col-span-2 space-y-6">
            
            <div class="bg-white p-6 rounded-xl shadow-md">
                <div class="flex flex-col md:flex-row justify-between items-center mb-4 gap-4">
                    <h2 class="text-2xl font-bold text-gray-700">Jadwal Ketersediaan</h2>
                    <div class="flex gap-2">
                        <select id="yearSelect" class="border rounded p-2 bg-gray-50" onchange="updateCalendar()"></select>
                        <select id="monthSelect" class="border rounded p-2 bg-gray-50" onchange="updateCalendar()">
                            <option value="0">Januari</option><option value="1">Februari</option><option value="2">Maret</option>
                            <option value="3">April</option><option value="4">Mei</option><option value="5">Juni</option>
                            <option value="6">Juli</option><option value="7">Agustus</option><option value="8">September</option>
                            <option value="9">Oktober</option><option value="10">November</option><option value="11">Desember</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-7 gap-1 text-center mb-2 font-semibold text-gray-500">
                    <div>Min</div><div>Sen</div><div>Sel</div><div>Rab</div><div>Kam</div><div>Jum</div><div>Sab</div>
                </div>
                <div id="calendarGrid" class="grid grid-cols-7 gap-1 text-center text-sm">
                    </div>
                
                <div class="mt-4 flex gap-4 text-xs justify-center">
                    <span class="flex items-center gap-1"><div class="w-3 h-3 bg-green-100 border border-green-500 rounded"></div> Tersedia</span>
                    <span class="flex items-center gap-1"><div class="w-3 h-3 bg-red-100 border border-red-500 rounded"></div> Penuh</span>
                    <span class="flex items-center gap-1"><div class="w-3 h-3 bg-gray-800 rounded"></div> Diblokir Admin</span>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-md border-l-4 border-blue-600">
                <h3 class="text-xl font-bold mb-4 flex items-center gap-2">
                    <i class="far fa-calendar-plus text-blue-600"></i> Form Booking Baru
                </h3>
                
                <form id="bookingForm" onsubmit="handleBooking(event)" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Nama Karyawan</label>
            <input type="text" id="empName" required class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Contoh: Budi Santoso">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">No. WhatsApp Karyawan</label>
            <input type="tel" id="empWa" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Contoh: 08123456789">
        </div>
    </div>
    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Pilih Mobil</label>
        <select id="carSelect" class="w-full border rounded-lg p-2 bg-white">
            <option value="Avanza - B 1234 CD">Toyota Avanza (Hitam)</option>
            <option value="Innova - B 5678 EF">Toyota Innova Zenix (Putih)</option>
            <option value="Fortuner - B 9999 XX">Toyota Fortuner (Hitam)</option>
            <option value="HiAce - B 1111 ZZ">Toyota HiAce (Silver)</option>
        </select>
    </div>
</div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Pilih Mobil</label>
                            <select id="carSelect" class="w-full border rounded-lg p-2 bg-white">
                                <option value="Avanza - B 1234 CD">Toyota Avanza (Hitam)</option>
                                <option value="Innova - B 5678 EF">Toyota Innova Zenix (Putih)</option>
                                <option value="Fortuner - B 9999 XX">Toyota Fortuner (Hitam)</option>
                                <option value="HiAce - B 1111 ZZ">Toyota HiAce (Silver)</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Tanggal</label>
                            <input type="date" id="bookDate" required class="w-full border rounded-lg p-2">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Jam Mulai</label>
                            <input type="time" id="startTime" required class="w-full border rounded-lg p-2">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Jam Selesai</label>
                            <input type="time" id="endTime" required class="w-full border rounded-lg p-2">
                        </div>
                    </div>

                    <div id="adminControls" class="hidden p-3 bg-red-50 border border-red-200 rounded text-sm text-red-700">
                        <label class="flex items-center gap-2">
                            <input type="checkbox" id="isBlock" class="w-4 h-4 text-red-600">
                            Mode Blokir Tanggal (Khusus Admin)
                        </label>
                    </div>

                    <button type="submit" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-3 rounded-lg shadow transition transform active:scale-95">
                        Konfirmasi Booking
                    </button>
                </form>
            </div>
        </div>

        <div class="lg:col-span-1">
            <div class="bg-white p-4 rounded-xl shadow-md sticky top-24 h-[85vh] flex flex-col">
                <h3 class="text-lg font-bold border-b pb-2 mb-2 flex justify-between items-center">
                    <span><i class="fas fa-list-ul text-blue-500 mr-2"></i>Daftar Booking</span>
                    <span class="text-xs bg-gray-200 px-2 py-1 rounded-full" id="totalBookings">0</span>
                </h3>
                
                <div class="mb-2">
                    <input type="text" id="searchBook" onkeyup="renderBookingList()" placeholder="Cari nama..." class="w-full text-sm p-2 border rounded">
                </div>

                <div id="bookingList" class="flex-1 overflow-y-auto space-y-3 pr-2">
                    <div class="text-center text-gray-400 mt-10">Belum ada booking</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Data & State ---
        let isAdmin = false;
        let bookings = [
            // Dummy Data
            { id: 1, name: "Andi Saputra", car: "Innova - B 5678 EF", date: new Date().toISOString().split('T')[0], start: "09:00", end: "12:00", type: "booking" },
            { id: 2, name: "ADMIN", car: "ALL", date: new Date(new Date().setDate(new Date().getDate() + 2)).toISOString().split('T')[0], start: "00:00", end: "23:59", type: "block" }
        ];

        // --- Inisialisasi ---
        const today = new Date();
        let currentMonth = today.getMonth();
        let currentYear = today.getFullYear();

        document.addEventListener('DOMContentLoaded', () => {
            setupYearSelect();
            document.getElementById('monthSelect').value = currentMonth;
            document.getElementById('yearSelect').value = currentYear;
            updateCalendar();
            renderBookingList();
        });

        // --- Calendar Logic ---
        function setupYearSelect() {
            const select = document.getElementById('yearSelect');
            for (let i = currentYear - 1; i <= currentYear + 3; i++) {
                let opt = document.createElement('option');
                opt.value = i;
                opt.innerHTML = i;
                select.appendChild(opt);
            }
        }

        function updateCalendar() {
            currentYear = parseInt(document.getElementById('yearSelect').value);
            currentMonth = parseInt(document.getElementById('monthSelect').value);
            
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            
            const calendarGrid = document.getElementById('calendarGrid');
            calendarGrid.innerHTML = "";

            // Empty slots for previous month
            for (let i = 0; i < firstDay; i++) {
                calendarGrid.innerHTML += `<div></div>`;
            }

            // Days
            for (let i = 1; i <= daysInMonth; i++) {
                const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                
                // Check bookings on this date
                const dayBookings = bookings.filter(b => b.date === dateStr);
                let bgClass = "bg-green-50 hover:bg-green-100 text-gray-700"; // Default Available
                let borderClass = "border-gray-200";
                
                if (dayBookings.some(b => b.type === 'block')) {
                    bgClass = "bg-gray-800 text-white"; // Admin Blocked
                    borderClass = "border-gray-800";
                } else if (dayBookings.length >= 3) {
                    bgClass = "bg-red-100 text-red-700 font-bold"; // Busy
                    borderClass = "border-red-300";
                } else if (dayBookings.length > 0) {
                    bgClass = "bg-yellow-50 text-yellow-700"; // Partially booked
                    borderClass = "border-yellow-300";
                }

                calendarGrid.innerHTML += `
                    <div onclick="selectDate('${dateStr}')" 
                         class="h-10 md:h-14 flex flex-col justify-center items-center rounded cursor-pointer border ${borderClass} ${bgClass} transition text-xs md:text-sm relative">
                        <span>${i}</span>
                        ${dayBookings.length > 0 && !dayBookings.some(b => b.type === 'block') ? `<span class="hidden md:block text-[9px] mt-1">${dayBookings.length} Booked</span>` : ''}
                    </div>
                `;
            }
        }

        function selectDate(date) {
            document.getElementById('bookDate').value = date;
            window.scrollTo({ top: document.querySelector('#bookingForm').offsetTop - 100, behavior: 'smooth' });
        }

        // --- Booking Logic ---
        function handleBooking(e) {
    e.preventDefault();
    
    const name = document.getElementById('empName').value;
    const empWa = document.getElementById('empWa').value; // Ambil data WA
    const car = document.getElementById('carSelect').value;
    const date = document.getElementById('bookDate').value;
    const start = document.getElementById('startTime').value;
    const end = document.getElementById('endTime').value;
    const isBlock = document.getElementById('isBlock').checked;

    if (start >= end) {
        alert("Jam selesai harus lebih akhir dari jam mulai!");
        return;
    }

    const conflict = bookings.find(b => 
        b.date === date && 
        b.car === car && 
        ((start >= b.start && start < b.end) || (end > b.start && end <= b.end))
    );

    if (conflict && !isAdmin) { 
        alert("Mobil ini sudah dibooking pada jam tersebut!");
        return;
    }

    const newBooking = {
        id: Date.now(),
        name: isAdmin && isBlock ? "DIBLOKIR ADMIN" : name,
        car: isAdmin && isBlock ? "ALL CARS" : car,
        date: date,
        start: start,
        end: end,
        type: isAdmin && isBlock ? 'block' : 'booking'
    };

    bookings.push(newBooking);
    bookings.sort((a, b) => new Date(a.date) - new Date(b.date));

    // Panggil fungsi kirim WA di sini
    sendWhatsAppNotification(newBooking.name, empWa, newBooking.car, newBooking.date, newBooking.start, newBooking.end, isBlock);

    alert(isAdmin && isBlock ? "Tanggal berhasil diblokir!" : "Booking Berhasil!");
    document.getElementById('bookingForm').reset();
    updateCalendar();
    renderBookingList();
}


        function deleteBooking(id) {
            if(!confirm("Hapus booking ini?")) return;
            bookings = bookings.filter(b => b.id !== id);
            updateCalendar();
            renderBookingList();
        }

        // --- Sidebar Logic ---
        function renderBookingList() {
            const list = document.getElementById('bookingList');
            const search = document.getElementById('searchBook').value.toLowerCase();
            const countSpan = document.getElementById('totalBookings');
            
            list.innerHTML = "";
            
            const filtered = bookings.filter(b => b.name.toLowerCase().includes(search));
            countSpan.innerText = filtered.length;

            if (filtered.length === 0) {
                list.innerHTML = `<div class="text-center text-gray-400 mt-10">Tidak ada data</div>`;
                return;
            }

            filtered.forEach(b => {
                const isBlock = b.type === 'block';
                const cardColor = isBlock ? "bg-gray-800 text-gray-200" : "bg-white border-l-4 border-blue-500 text-gray-700";
                
                list.innerHTML += `
                    <div class="p-3 rounded shadow-sm ${cardColor} relative group text-sm">
                        <div class="font-bold flex justify-between">
                            ${b.name}
                            ${isAdmin ? `<button onclick="deleteBooking(${b.id})" class="text-red-500 hover:text-red-700"><i class="fas fa-trash"></i></button>` : ''}
                        </div>
                        <div class="text-xs mt-1 opacity-80">
                            <i class="fas fa-car mr-1"></i> ${b.car}
                        </div>
                        <div class="text-xs mt-1 opacity-80 flex justify-between">
                            <span><i class="far fa-calendar mr-1"></i> ${b.date}</span>
                            <span><i class="far fa-clock mr-1"></i> ${b.start} - ${b.end}</span>
                        </div>
                    </div>
                `;
            });
        }

        // --- Admin Logic ---
        function toggleAdminMode() {
            if (!isAdmin) {
                const pass = prompt("Masukkan Password Admin:");
                if (pass === "admin123") {
                    isAdmin = true;
                    document.getElementById('authBtn').innerHTML = `<i class="fas fa-sign-out-alt"></i> Logout`;
                    document.getElementById('authBtn').classList.replace('bg-blue-600', 'bg-red-600');
                    document.getElementById('adminControls').classList.remove('hidden');
                    alert("Login Admin Berhasil! Anda bisa menghapus booking dan memblokir tanggal.");
                } else {
                    alert("Password Salah!");
                }
            } else {
                isAdmin = false;
                document.getElementById('authBtn').innerHTML = `<i class="fas fa-user-shield"></i> Login Admin`;
                document.getElementById('authBtn').classList.replace('bg-red-600', 'bg-blue-600');
                document.getElementById('adminControls').classList.add('hidden');
            }
            renderBookingList(); // Refresh list to show/hide delete buttons
        }
// --- Fungsi Notifikasi WhatsApp ---
async function sendWhatsAppNotification(name, waNumber, car, date, start, end, isBlock) {
    const adminWa = "0881081371012"; // GANTI dengan nomor WA Admin yang sebenarnya
    
    // Format Pesan
    const message = `🚗 *Notifikasi CorpCar Booking* 🚗\n\n` +
                    `*Nama:* ${name}\n` +
                    `*Mobil:* ${car}\n` +

                    `*Waktu:* ${start} - ${end}\n\n` +
                    (isBlock ? `⚠️ *Status: TANGGAL DIBLOKIR ADMIN*` : `✅ *Status: Booking Berhasil Dicatat*`);

    // OPSI A: Menggunakan API Gateway (Otomatis Kirim di Background)
    // Contoh menggunakan Fonnte (https://fonnte.com) - Anda perlu daftar dan masukkan Token.
    /*
    const token = "TOKEN_API_ANDA_DISINI";
    const targets = isBlock ? adminWa : `${adminWa},${waNumber}`; // Kirim ke admin dan pembooking
    
    try {
        await fetch("https://api.fonnte.com/send", {
            method: "POST",
            headers: { "Authorization": token },
            body: new URLSearchParams({
                target: targets,
                message: message
            })
        });
        console.log("Notifikasi WA terkirim otomatis!");
    } catch (error) {
        console.error("Gagal kirim WA:", error);
    }
    */

    // OPSI B: Menggunakan link wa.me (Manual Klik, Tanpa Server/API)

    const waLink = `https://wa.me/62${adminWa.substring(1)}?text=${encodeURIComponent(message)}`;
    window.open(waLink, '_blank');
}

    </script>
</body>
</html>
